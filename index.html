<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alchiroq App</title>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Yuklanish animatsiyasi stili */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Dastlab yashirin bo'ladi */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            z-index: 9999;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #0088cc; /* Telegram ko'k rangi */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            font-weight: 500;
        }

        /* Asosiy sayt ramkasi */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">Ilovaga ulanmoqda...</div>
    </div>

    <iframe id="mainApp" src="https://app.alchiroq.uz"></iframe>

    <script>
        const loader = document.getElementById('loader');
        const iframe = document.getElementById('mainApp');
        
        // Adsgram ID (O'zingiznikini qo'ying, hozircha test ID: 2754)
        const AdController = window.Adsgram.init({ blockId: "int-25479" });

        window.onload = function() {
            // 1. REKLAMANI KO'RSATISH
            AdController.show()
                .then(() => {
                    // Reklama muvaffaqiyatli ko'rildi
                    runAnimationAndOpen();
                })
                .catch((err) => {
                    // Reklama yuklanmasa ham ilova ochilishi kerak
                    console.error("Reklama xatosi:", err);
                    runAnimationAndOpen();
                });
        };

        function runAnimationAndOpen() {
            // 2. ANIMATSIYANI BOSHLASH
            loader.style.display = 'flex';

            // 3. 3 SEKUND KUTISH VA SAYTGA KIRISH
            setTimeout(() => {
                loader.style.display = 'none';
                iframe.style.display = 'block';
            }, 3000); // 3000 millisoniya = 3 sekund
        }
    </script>
</body>
</html>
